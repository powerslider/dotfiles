# NitPickle global default policy. Install at ~/.claude/nitpickle/policy.yaml.
#
# Used for any repo that has no local .nitpickle/policy.yaml. A repo-local policy
# overrides these per top-level key, and `rules` is the union of global and local.
# No local .nitpickle/ at all means these defaults apply unchanged.
#
# This default is language-agnostic. Put language-specific commands and rules in
# each repo's local policy.

version: 1

# Domain language and decisions, when the repo has them.
context:
  glossary: CONTEXT.md       # CONTEXT-MAP.md for multi-context repos
  adr_dir: docs/adr

# Deterministic checks. Set these per repo. With none defined, NitPickle detects
# the obvious ones from the repo (test, lint, vuln, build) and ingests their output.
commands: {}
  # test: <repo test command>
  # lint: <repo lint command>
  # vuln: <repo vulnerability scan>

# Universal judgment rules. Language-agnostic. Add language-specific ones locally.
rules:
  - handle_all_errors                  # no silently swallowed errors
  - test_for_behavior_change           # behavior changes ship with a test
  - test_for_each_error_path           # error and edge branches have coverage
  - public_api_change_needs_migration_note
  - no_dead_code_left_behind
  - comments_what_not_how              # comment intent or invariant, not how it works
  - no_package_comments_unless_asked   # skip package doc comments unless requested
  - no_emdashes_or_semicolons          # in comments and any generated prose
  - no_ai_or_tool_attribution          # no "generated by NitPickle/AI" banners anywhere
  # commits (defined in preferences.md)
  - commit_conventional_commits        # strict Conventional Commits format
  - commit_footer_resolves_and_signoff # footer: resolves <issue_id> + Signed-off-by from git config

# Files NitPickle must never propose edits to. Generic globs. Extend per repo.
generated_files:
  - "**/*_generated.*"
  - "**/*.pb.go"
  - "**/generated/**"

# Soft limits. NitPickle warns and suggests a split if exceeded, never blocks.
diff_budget:
  max_lines_soft: 300
  max_files_soft: 10

# PR review defaults (used by review-pr).
review:
  default_mode: deep

# Severity gating. blocking requires a runnable Proof. The trust mechanic.
# Do not change without understanding ADR-0001.
proof:
  blocking_requires: [test, repro]

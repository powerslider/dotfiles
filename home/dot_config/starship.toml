# Starship ‚ÄĒ fast, declarative prompt.
#
# Replaces the old oh-my-zsh `gentoo` theme + hand-rolled
# zsh-kubectl-prompt RPROMPT.

add_newline = true

# Battery shown at the far right of the prompt line.
right_format = "$battery"

[character]
success_symbol = "[‚Äļ](bold green)"
error_symbol   = "[‚Äļ](bold red)"

[battery]
format             = "[$symbol $percentage]($style)"
full_symbol        = "ůįĀĻ"
charging_symbol    = "ůįāĄ"
discharging_symbol = "ůįĀĺ"
unknown_symbol     = "ůįāĎ"
empty_symbol       = "ůįāÉ"
[[battery.display]]
threshold = 20
style     = "bold red"
[[battery.display]]
threshold = 50
style     = "bold yellow"
[[battery.display]]
threshold = 100
style     = "green"

# Show the full path, never truncated.
[directory]
truncation_length = 0
truncate_to_repo  = false
truncation_symbol = ""

[git_branch]
format = "[$symbol$branch]($style) "
style  = 'bold #c3e88d'

[git_status]
# Counts coloured by meaning ‚ÄĒ quick visual scan tells you what's pending.
style      = "bold"
format     = '([\[$ahead_behind$all_status\]]($style) )'
staged     = '[‚úö${count}](green) '
deleted    = '[‚úĖ${count}](red) '
renamed    = '[‚ěú${count}](purple) '
stashed    = '[‚ú≠${count}](cyan) '
untracked  = '[?${count}](white) '
modified   = '[‚óŹ${count}](blue) '
conflicted = '[‚ēź${count}](yellow) '
ahead      = '[‚á°${count}](green) '
behind     = '[‚á£${count}](red) '
diverged   = '[‚áē‚á°${ahead_count}‚á£${behind_count}](yellow) '

[cmd_duration]
min_time = 2_000
format   = "took [$duration]($style) "

# Worktree context as "project ‚ßČ worktree". Superset injects env vars
# into its workspace terminals, so that path is free. The git fallback
# covers worktrees entered from a normal shell.
[custom.worktree]
when = '''
[ -n "$SUPERSET_WORKSPACE_NAME" ] || {
    g=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
    c=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
    [ -n "$g" ] && [ "$g" != "$c" ]
}
'''
command = '''
if [ -n "$SUPERSET_WORKSPACE_NAME" ]; then
    printf '%s ‚ßČ %s' "${SUPERSET_ROOT_PATH##*/}" "$SUPERSET_WORKSPACE_NAME"
else
    c=$(git rev-parse --path-format=absolute --git-common-dir)
    r=${c%/.git}
    printf '%s ‚ßČ %s' "${r##*/}" "$(basename "$(git rev-parse --show-toplevel)")"
fi
'''
format = '[$output]($style) '
style  = 'bold #82aaff'

# Kubernetes context disabled ‚ÄĒ was noisy and rarely useful in this prompt.
[kubernetes]
disabled = true

# GCP service-account / project indicator disabled (the ‚ėĀ block).
[gcloud]
disabled = true

# Language version indicators disabled ‚ÄĒ version info belongs in mise/asdf,
# not in every prompt line.
[golang]
disabled = true
[nodejs]
disabled = true
[python]
disabled = true
[rust]
disabled = true
[java]
disabled = true

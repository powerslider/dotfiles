# Global mise config.
#
# Replaces nvm + jenv (and asdf if you ever used it). Pin per-project
# versions in `.tool-versions` or `.mise.toml` inside the project; this
# file is for global defaults.
#
# After editing: `mise install` to materialise.

[settings]
experimental = true
# Auto-install on `cd` into a project with .tool-versions / .mise.toml
auto_install = true
# Skip Node release-team GPG verification — keyring drift breaks fresh
# installs faster than the keys can be canonically updated. SHA256
# checksum verification still happens.
node.gpg_verify = false

# Global tool versions. Materialised by `mise install` (run by bootstrap.sh).
# Override per-project in `.tool-versions` or `.mise.toml` at the repo root.
[tools]
go     = "latest"
rust   = "latest"
node   = "lts"
python = "latest"

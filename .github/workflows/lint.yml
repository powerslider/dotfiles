name: lint

on:
  push:
    branches: [master]
  pull_request:
  # Weekly safety net — catches Brewfile drift even with no commits.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: --severity=warning -e SC1091
        with:
          ignore_paths: .git .claude

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mfinelli/setup-shfmt@v3
      - name: Check formatting
        run: |
          mapfile -t files < <(find . -name '*.sh' \
              -not -path './.git/*' \
              -not -path './.claude/*')
          shfmt -d -i 4 -ci -bn -sr "${files[@]}"

  brew-bundle:
    name: brew bundle validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Brewfile entries resolve
        # `brew bundle check` measures install state, useless on a fresh
        # runner. Instead: tap third-party taps and call `brew info` on
        # every brew/cask to confirm each entry is a real, resolvable
        # formula / cask (catches typos, removals, deprecations).
        run: |
          set -euo pipefail
          awk -F'"' '/^tap "/ {print $2}' Brewfile | while read -r t; do
              echo "→ tap $t"
              brew tap "$t"
          done
          awk -F'"' '/^brew "/ {print $2}' Brewfile | while read -r f; do
              if ! brew info "$f" > /dev/null 2>&1; then
                  echo "❌ Unknown formula: $f"
                  exit 1
              fi
          done
          awk -F'"' '/^cask "/ {print $2}' Brewfile | while read -r c; do
              if ! brew info --cask "$c" > /dev/null 2>&1; then
                  echo "❌ Unknown cask: $c"
                  exit 1
              fi
          done
          echo "✓ All Brewfile entries resolve."
